<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NARP Admin — Economy Settings</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    .settings-section { background: var(--ink-mid); border: 1px solid var(--border-dim); border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
    .settings-row { display: grid; grid-template-columns: 1fr 140px 140px 80px; gap: 0.75rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid rgba(201,168,76,0.05); }
    .settings-row:last-child { border-bottom: none; }
    .settings-row label { font-family: var(--ff-body); font-size: 0.95rem; }
    .settings-input {
      background: var(--ink-light); border: 1px solid var(--border-dim); border-radius: 4px;
      padding: 0.4rem 0.6rem; color: var(--paper); font-family: var(--ff-display); font-size: 0.9rem;
      text-align: right; outline: none; width: 100%; transition: border-color 0.2s;
    }
    .settings-input:focus { border-color: var(--seal-gold); }
    .preview-val { font-family: var(--ff-display); font-size: 0.85rem; color: var(--seal-gold); text-align: right; }
    .del-btn { background: transparent; border: 1px solid rgba(192,57,43,0.3); color: #e07060; border-radius: 4px; padding: 0.3rem 0.6rem; font-size: 0.6rem; font-family: var(--ff-display); cursor: pointer; transition: all 0.2s; }
    .del-btn:hover { background: rgba(192,57,43,0.1); }
    .add-row { display: grid; grid-template-columns: 1fr 140px 80px; gap: 0.75rem; align-items: center; padding-top: 0.75rem; border-top: 1px solid var(--border-dim); margin-top: 0.75rem; }
    .save-bar { position: sticky; bottom: 0; background: var(--ink-deep); border-top: 1px solid var(--border-dim); padding: 1rem 2rem; display: flex; gap: 1rem; align-items: center; z-index: 10; }
    .unsaved-dot { width: 8px; height: 8px; background: var(--seal-red); border-radius: 50%; display: none; }
    .unsaved-dot.show { display: inline-block; }

    /* Desktop grid layouts */
    .master-dial-grid { display: grid; grid-template-columns: 1fr 180px 180px; gap: 1rem; align-items: center; }
    .safety-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
    .tier-header { display: grid; grid-template-columns: 1fr 140px 140px; gap: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-dim); margin-bottom: 0.5rem; }
    .income-header { display: grid; grid-template-columns: 1fr 120px 80px; gap: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-dim); margin-bottom: 0.5rem; }
    .col-label { font-family: var(--ff-display); font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ash); }
    .col-label.right { text-align: right; }
    .m-label { display: none; font-family: var(--ff-display); font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ash); margin-bottom: 0.2rem; }

    /* ── ECONOMY SLIDERS ─────────────────────────── */
    .slider-wrap { width: 100%; }
    .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; gap: 0.5rem; flex-wrap: wrap; }
    .slider-value { font-family: var(--ff-display); font-size: 1.3rem; font-weight: 700; color: var(--seal-gold); }
    .slider-zone-label {
      font-family: var(--ff-display); font-size: 0.6rem; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 2rem; white-space: nowrap;
    }
    .zone-blue   { background: rgba(74,158,255,0.15);  color: #7ab8f5; border: 1px solid rgba(74,158,255,0.3); }
    .zone-green  { background: rgba(45,122,94,0.2);    color: #5bbf94; border: 1px solid rgba(45,122,94,0.3); }
    .zone-yellow { background: rgba(201,168,76,0.15);  color: #d4b060; border: 1px solid rgba(201,168,76,0.3); }
    .zone-orange { background: rgba(192,100,43,0.2);   color: #e09060; border: 1px solid rgba(192,100,43,0.3); }
    .zone-red    { background: rgba(192,57,43,0.2);    color: #e07060; border: 1px solid rgba(192,57,43,0.3); }
    .zone-gray   { background: rgba(107,100,87,0.2);   color: #9a9080; border: 1px solid rgba(107,100,87,0.3); }

    .economy-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 8px; border-radius: 4px;
      outline: none; cursor: pointer; background: var(--ink-light);
    }
    .economy-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: var(--paper); border: 2px solid var(--seal-gold); cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4); transition: box-shadow 0.2s;
    }
    .economy-slider::-webkit-slider-thumb:hover { box-shadow: 0 2px 12px rgba(201,168,76,0.5); }
    .economy-slider::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--paper); border: 2px solid var(--seal-gold); cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .economy-slider::-moz-range-track { height: 8px; border-radius: 4px; background: transparent; }

    .slider-desc {
      font-size: 0.75rem; color: var(--ash); font-style: italic;
      margin-top: 0.5rem; line-height: 1.4;
    }
    .slider-preview {
      font-family: var(--ff-display); font-size: 0.7rem; color: var(--seal-gold);
      margin-top: 0.4rem; padding: 0.35rem 0.6rem;
      background: rgba(201,168,76,0.06); border-radius: var(--radius);
      border-left: 2px solid var(--seal-gold);
    }

    .method-toggle-wrap {
      display: flex; gap: 0; border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border-dim);
    }
    .method-toggle-btn {
      flex: 1; padding: 0.5rem 0.75rem;
      font-family: var(--ff-display); font-size: 0.65rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; border: none;
      background: var(--ink-light); color: var(--ash);
      transition: all 0.2s; text-align: center;
    }
    .method-toggle-btn:hover { color: var(--paper-dim); }
    .method-toggle-btn.active { background: var(--seal-gold); color: var(--ink-deep); font-weight: 700; }
    .method-info {
      font-size: 0.7rem; margin-top: 0.4rem; padding: 0.35rem 0.6rem;
      border-radius: var(--radius); line-height: 1.4;
    }
    .method-info-blue { color: #7ab8f5; background: rgba(74,158,255,0.08); border-left: 2px solid rgba(74,158,255,0.4); }
    .method-info-yellow { color: #d4b060; background: rgba(201,168,76,0.08); border-left: 2px solid rgba(201,168,76,0.4); }

    /* ── MOBILE ECONOMY REDESIGN ─────────────────── */
    @media (max-width: 768px) {
      .m-label { display: block; }
      .settings-section { padding: 1rem; }

      /* Master Dial — stack vertically */
      .master-dial-grid {
        grid-template-columns: 1fr;
      }
      .master-dial-grid .settings-input {
        width: 100% !important;
        max-width: none !important;
      }
      .master-dial-grid .preview-val {
        text-align: center;
        font-size: 1rem;
        padding: 0.25rem 0;
        border-top: 1px solid var(--border-dim);
      }

      /* Safety Settings — single column */
      .safety-grid {
        grid-template-columns: 1fr;
        gap: 1.25rem;
      }
      .safety-grid .settings-input,
      .safety-grid select.settings-input {
        width: 100% !important;
      }

      /* Hide desktop column headers */
      .tier-header, .income-header { display: none; }

      /* Settings rows become cards */
      .settings-row {
        grid-template-columns: 1fr 1fr;
        background: rgba(42, 38, 30, 0.5);
        border-radius: var(--radius);
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        border-bottom: none;
      }
      .settings-row:last-child { border-bottom: none; margin-bottom: 0; }
      .settings-row > :first-child {
        grid-column: 1 / -1;
      }
      .settings-row label {
        color: var(--seal-gold);
        font-size: 0.9rem;
        font-family: var(--ff-display);
        padding-bottom: 0.25rem;
        border-bottom: 1px solid rgba(201,168,76,0.1);
        margin-bottom: 0.15rem;
      }
      .settings-row .del-btn {
        justify-self: end;
        align-self: end;
        padding: 0.35rem 0.75rem;
      }
      .settings-row .settings-input { text-align: center; }
      .settings-row .income-name { text-align: left !important; }

      /* Add row — stack name, GRP + button side by side */
      .add-row {
        grid-template-columns: 1fr auto;
      }
      .add-row > :first-child {
        grid-column: 1 / -1;
      }
      .add-row .btn { align-self: end; }

      /* Save bar — compact */
      .save-bar {
        padding: 0.75rem 1rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .save-bar .btn { font-size: 0.6rem; padding: 0.5rem 0.9rem; }

      /* Sliders on mobile */
      .slider-value { font-size: 1.1rem; }
      .slider-zone-label { font-size: 0.55rem; padding: 0.15rem 0.5rem; }
      .slider-preview { font-size: 0.65rem; }
      .slider-desc { font-size: 0.7rem; }
      .economy-slider { height: 10px; }
      .economy-slider::-webkit-slider-thumb { width: 28px; height: 28px; }
      .economy-slider::-moz-range-thumb { width: 28px; height: 28px; }
      .method-toggle-btn { padding: 0.6rem; font-size: 0.6rem; }
      .method-info { font-size: 0.65rem; }
    }

    @media (max-width: 480px) {
      .settings-section { padding: 0.75rem; }
      .master-dial-grid .preview-val { font-size: 0.9rem; }
      .settings-row { padding: 0.6rem; gap: 0.35rem 0.5rem; }
      .settings-row label { font-size: 0.8rem; }
      .settings-row .settings-input { font-size: 0.8rem; padding: 0.35rem 0.5rem; }
      .save-bar .btn { font-size: 0.55rem; padding: 0.4rem 0.75rem; }

      /* Sliders on small screens */
      .slider-value { font-size: 0.95rem; }
      .slider-preview { font-size: 0.6rem; padding: 0.3rem 0.5rem; }
      .slider-desc { font-size: 0.65rem; }
      .economy-slider::-webkit-slider-thumb { width: 26px; height: 26px; }
      .economy-slider::-moz-range-thumb { width: 26px; height: 26px; }
    }
  </style>
</head>
<body>
<div id="nav-mount"></div>
<section class="hero" style="padding:3rem 2rem 2rem">
  <div class="hero-eyebrow">Admin Panel</div>
  <h1 class="hero-title" style="font-size:clamp(1.6rem,4vw,2.8rem)">Economy <em>Settings</em></h1>
  <p class="hero-sub">Edit master dial, tier costs, and all income types.</p>
</section>
<div class="container" style="padding-bottom:6rem">
  <div id="root"><div class="loading-seal"><div class="spinner"></div><p>Loading settings...</p></div></div>
</div>
<div class="save-bar" id="save-bar" style="display:none">
  <span class="unsaved-dot show" id="unsaved-dot"></span>
  <span style="font-size:0.8rem;color:var(--ash);font-style:italic" id="save-status">Unsaved changes</span>
  <button class="btn btn-gold" id="save-all-btn">Save All Changes</button>
  <button class="btn btn-ghost" id="discard-btn">Discard</button>
</div>
<footer class="footer">NARP Economy &nbsp;·&nbsp; <span>Admin</span></footer>
<script type="module">
import { fetchAPI, forceRefresh, adminSave, calcDial, calcAW, calcGini, fmtRyo, getTiers } from '/js/api.js';
import { initAuth, login, logout, requireAdmin } from '/js/auth.js';
import { renderNav, renderError, sectionHeader, attachGlobalHandlers } from '/js/utils.js';

document.getElementById('nav-mount').innerHTML = renderNav('economy');
attachGlobalHandlers(login, logout);

let _data    = null;
let _config  = null;
let _incomes = null;
let _dirty   = false;

initAuth(async () => {
  if (!requireAdmin()) return;
  _data    = await fetchAPI();
  _config  = JSON.parse(JSON.stringify(_data.config || { master_dial: 0.005, aw_floor: 200, smoothing_alpha: 0.4, aw_method: 'trimmed_mean', tiers: getTiers(_data) }));
  _incomes = JSON.parse(JSON.stringify(_data.income_types || []));
  renderPage();
});

function markDirty() {
  _dirty = true;
  document.getElementById('save-bar').style.display = 'flex';
}

function calcRyo(grp) {
  const aw = calcAW(_data);
  return aw > 0 ? fmtRyo(grp * _config.master_dial * aw) : '—';
}

/* ── Slider zone helpers ───────────────────────── */
function getDialZone(v) {
  if (v < 0.003) return { cls: 'zone-blue', label: 'Very Slow Economy', desc: 'Rewards feel tiny, progression crawls' };
  if (v < 0.005) return { cls: 'zone-blue', label: 'Slowed Down', desc: 'Below standard baseline' };
  if (v <= 0.005) return { cls: 'zone-green', label: 'Standard Baseline', desc: 'Recommended default' };
  if (v <= 0.010) return { cls: 'zone-yellow', label: 'Accelerated', desc: 'Prices and rewards growing faster than normal' };
  return { cls: 'zone-red', label: 'High Stimulus', desc: 'Economy is heating up, monitor inflation closely' };
}
function getAlphaZone(v) {
  if (v < 0.3) return { cls: 'zone-blue', label: 'Very Stable', desc: 'AW responds slowly to changes, good for volatile servers' };
  if (v <= 0.5) return { cls: 'zone-green', label: 'Balanced', desc: 'Standard responsiveness' };
  if (v <= 0.7) return { cls: 'zone-yellow', label: 'Responsive', desc: 'AW tracks weekly changes more closely' };
  return { cls: 'zone-orange', label: 'Highly Reactive', desc: 'At 1.0, smoothing is disabled entirely' };
}
function getFloorZone(v) {
  if (v < 100) return { cls: 'zone-gray', label: 'No Floor', desc: 'Economy can anchor near zero' };
  if (v <= 300) return { cls: 'zone-green', label: 'Standard Range', desc: 'Recommended for established servers' };
  if (v <= 600) return { cls: 'zone-yellow', label: 'High Floor', desc: 'New player rewards feel strong even early on' };
  return { cls: 'zone-orange', label: 'Very High Floor', desc: 'May make the economy feel detached from reality' };
}
function getZoneColor(cls) {
  const map = { 'zone-blue':'#4a9eff','zone-green':'#5bbf94','zone-yellow':'#d4b060','zone-orange':'#e09060','zone-red':'#e07060','zone-gray':'#6b6457' };
  return map[cls] || '#6b6457';
}
function updateSliderTrack(slider, color) {
  const min = parseFloat(slider.min), max = parseFloat(slider.max), val = parseFloat(slider.value);
  const pct = ((val - min) / (max - min)) * 100;
  slider.style.background = 'linear-gradient(to right, ' + color + ' 0%, ' + color + ' ' + pct + '%, #2a261e ' + pct + '%, #2a261e 100%)';
}
function updateDialSlider() {
  const slider = document.getElementById('dial-slider');
  if (!slider) return;
  const v = parseFloat(slider.value);
  _config.master_dial = v;
  const zone = getDialZone(v);
  const aw = calcAW(_data);
  document.getElementById('dial-value').textContent = v.toFixed(4);
  const zoneEl = document.getElementById('dial-zone');
  zoneEl.textContent = zone.label;
  zoneEl.className = 'slider-zone-label ' + zone.cls;
  document.getElementById('dial-desc').textContent = zone.desc;
  const stdTier = (_config.tiers || []).find(t => t.name === 'Standard');
  const stdGrp = stdTier ? stdTier.grp : 16;
  document.getElementById('dial-preview').textContent =
    'At this dial, 1 Graded RP earns ' + fmtRyo(1 * v * aw) + ' and a Standard item costs ' + fmtRyo(stdGrp * v * aw);
  document.querySelectorAll('.tier-preview').forEach((el, i) => {
    el.textContent = fmtRyo((_config.tiers[i]?.grp || 0) * v * aw);
  });
  updateSliderTrack(slider, getZoneColor(zone.cls));
}
function updateFloorSlider() {
  const slider = document.getElementById('floor-slider');
  if (!slider) return;
  const v = parseInt(slider.value);
  _config.aw_floor = v;
  const zone = getFloorZone(v);
  document.getElementById('floor-value').textContent = v;
  const zoneEl = document.getElementById('floor-zone');
  zoneEl.textContent = zone.label;
  zoneEl.className = 'slider-zone-label ' + zone.cls;
  document.getElementById('floor-desc').textContent = zone.desc;
  document.getElementById('floor-preview').textContent =
    'At this floor, the minimum 1 Graded RP earns is ' + fmtRyo(1 * _config.master_dial * v);
  updateSliderTrack(slider, getZoneColor(zone.cls));
}
function updateAlphaSlider() {
  const slider = document.getElementById('alpha-slider');
  if (!slider) return;
  const v = parseFloat(slider.value);
  _config.smoothing_alpha = v;
  const zone = getAlphaZone(v);
  document.getElementById('alpha-value').textContent = v.toFixed(2);
  const zoneEl = document.getElementById('alpha-zone');
  zoneEl.textContent = zone.label;
  zoneEl.className = 'slider-zone-label ' + zone.cls;
  document.getElementById('alpha-desc').textContent = zone.desc;
  const shift = (30 * v).toFixed(1);
  document.getElementById('alpha-preview').textContent =
    'A 30% spike in player wealth would shift AW by approximately ' + shift + '% this week';
  updateSliderTrack(slider, getZoneColor(zone.cls));
}
function updateMethodInfo() {
  const method = _config.aw_method || 'trimmed_mean';
  const gini = calcGini(_data);
  const el = document.getElementById('method-info');
  if (!el) return;
  if (method === 'median') {
    el.className = 'method-info method-info-blue';
    el.textContent = 'Median mode active \u2014 whale balances cannot skew AW. Recommended when Gini > 0.35';
  } else if (gini > 0.35) {
    el.className = 'method-info method-info-yellow';
    el.textContent = '\u26a0\ufe0f Gini is ' + gini.toFixed(2) + ' \u2014 consider switching to Median';
  } else {
    el.className = 'method-info method-info-blue';
    el.textContent = 'Trimmed Mean active \u2014 balanced weighting of all player balances';
  }
}
function initSliders() {
  updateDialSlider();
  updateFloorSlider();
  updateAlphaSlider();
  updateMethodInfo();
}

function renderPage() {
  const root = document.getElementById('root');
  const aw   = calcAW(_data);

  root.innerHTML = `
  <!-- MASTER DIAL -->
  ${sectionHeader('Master Dial')}
  <div class="settings-section">
    <div style="font-weight:bold;margin-bottom:0.25rem">Graded RP Reward Target</div>
    <div class="slider-wrap">
      <div class="slider-header">
        <span class="slider-value" id="dial-value">${_config.master_dial}</span>
        <span class="slider-zone-label" id="dial-zone"></span>
      </div>
      <input type="range" class="economy-slider" id="dial-slider"
        min="0.001" max="0.020" step="0.0001" value="${_config.master_dial}">
      <div class="slider-desc" id="dial-desc"></div>
      <div class="slider-preview" id="dial-preview"></div>
    </div>
  </div>

  <!-- SAFETY VARIABLES -->
  ${sectionHeader('Economy Safety Settings')}
  <div class="settings-section">
    <div class="safety-grid">
      <div>
        <div style="font-weight:bold;margin-bottom:0.25rem">AW Floor</div>
        <div class="slider-wrap">
          <div class="slider-header">
            <span class="slider-value" id="floor-value">${_config.aw_floor || 200}</span>
            <span class="slider-zone-label" id="floor-zone"></span>
          </div>
          <input type="range" class="economy-slider" id="floor-slider"
            min="0" max="2000" step="50" value="${_config.aw_floor || 200}">
          <div class="slider-desc" id="floor-desc"></div>
          <div class="slider-preview" id="floor-preview"></div>
        </div>
      </div>
      <div>
        <div style="font-weight:bold;margin-bottom:0.25rem">Smoothing Alpha</div>
        <div class="slider-wrap">
          <div class="slider-header">
            <span class="slider-value" id="alpha-value">${_config.smoothing_alpha || 0.4}</span>
            <span class="slider-zone-label" id="alpha-zone"></span>
          </div>
          <input type="range" class="economy-slider" id="alpha-slider"
            min="0.1" max="1.0" step="0.05" value="${_config.smoothing_alpha || 0.4}">
          <div class="slider-desc" id="alpha-desc"></div>
          <div class="slider-preview" id="alpha-preview"></div>
        </div>
      </div>
      <div>
        <div style="font-weight:bold;margin-bottom:0.25rem">AW Method</div>
        <div style="font-size:0.75rem;color:var(--ash);font-style:italic;margin-bottom:0.5rem">Switch to Median when Gini &gt; 0.35 to prevent whale inflation.</div>
        <div class="method-toggle-wrap">
          <button type="button" class="method-toggle-btn ${(_config.aw_method||'trimmed_mean')==='trimmed_mean'?'active':''}" data-method="trimmed_mean">Trimmed Mean</button>
          <button type="button" class="method-toggle-btn ${_config.aw_method==='median'?'active':''}" data-method="median">Median</button>
        </div>
        <div class="method-info" id="method-info"></div>
      </div>
    </div>
  </div>

  <!-- TIER COSTS -->
  ${sectionHeader('Tier Graded RP Costs')}
  <div class="settings-section">
    <div class="tier-header">
      <span class="col-label">Tier</span>
      <span class="col-label right">GRP Cost</span>
      <span class="col-label right">Ryo at current AW</span>
    </div>
    ${(_config.tiers||[]).map((t,i) => `
      <div class="settings-row">
        <label>${t.name}</label>
        <div><span class="m-label">GRP Cost</span><input type="number" class="settings-input tier-grp" data-idx="${i}"
          value="${t.grp}" min="1" step="1"></div>
        <div><span class="m-label">Ryo Value</span><div class="preview-val tier-preview" data-idx="${i}">${calcRyo(t.grp)}</div></div>
      </div>`).join('')}
  </div>

  <!-- PLAYER INCOMES -->
  ${sectionHeader('Player Income Types')}
  <div class="settings-section" id="player-incomes-wrap">
    ${renderIncomeList(_incomes.filter(i => i.category !== 'staff'), 'player')}
  </div>

  <!-- STAFF INCOMES -->
  ${sectionHeader('Staff Income Types')}
  <div class="settings-section" id="staff-incomes-wrap">
    ${renderIncomeList(_incomes.filter(i => i.category === 'staff'), 'staff')}
  </div>`;

  // Slider handlers
  document.getElementById('dial-slider').addEventListener('input', function() { updateDialSlider(); markDirty(); });
  document.getElementById('floor-slider').addEventListener('input', function() { updateFloorSlider(); markDirty(); });
  document.getElementById('alpha-slider').addEventListener('input', function() { updateAlphaSlider(); markDirty(); });
  document.querySelectorAll('.method-toggle-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      _config.aw_method = this.dataset.method;
      document.querySelectorAll('.method-toggle-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      updateMethodInfo();
      markDirty();
    });
  });

  // Initialize slider visuals
  initSliders();

  // Tier GRP inputs
  root.addEventListener('input', e => {
    if (e.target.classList.contains('tier-grp')) {
      const i   = parseInt(e.target.dataset.idx);
      const val = parseInt(e.target.value)||1;
      _config.tiers[i].grp = val;
      root.querySelector(`.tier-preview[data-idx="${i}"]`).textContent = calcRyo(val);
      markDirty();
    }
    if (e.target.classList.contains('income-grp')) {
      const id  = e.target.dataset.id;
      const val = parseInt(e.target.value)||1;
      const inc = _incomes.find(i => i.id === id);
      if (inc) { inc.grp = val; markDirty(); }
    }
    if (e.target.classList.contains('income-name')) {
      const id = e.target.dataset.id;
      const inc= _incomes.find(i => i.id === id);
      if (inc) { inc.name = e.target.value; markDirty(); }
    }
  });

  // Delete income
  root.addEventListener('click', e => {
    if (e.target.classList.contains('del-income')) {
      const id = e.target.dataset.id;
      const inc= _incomes.find(i => i.id === id);
      if (inc && confirm('Remove "'+inc.name+'"?')) {
        _incomes = _incomes.filter(i => i.id !== id);
        markDirty();
        document.getElementById('player-incomes-wrap').innerHTML = renderIncomeList(_incomes.filter(i=>i.category!=='staff'), 'player');
        document.getElementById('staff-incomes-wrap').innerHTML  = renderIncomeList(_incomes.filter(i=>i.category==='staff'),  'staff');
      }
    }
    // Add income
    if (e.target.id === 'add-player-btn') addIncome('player');
    if (e.target.id === 'add-staff-btn')  addIncome('staff');
  });

  // Save all
  document.getElementById('save-all-btn').addEventListener('click', saveAll);
  document.getElementById('discard-btn').addEventListener('click', async () => {
    _data    = await forceRefresh();
    _config  = JSON.parse(JSON.stringify(_data.config || { master_dial:0.005, aw_floor:200, smoothing_alpha:0.4, aw_method:'trimmed_mean', tiers:getTiers(_data) }));
    _incomes = JSON.parse(JSON.stringify(_data.income_types||[]));
    _dirty   = false;
    document.getElementById('save-bar').style.display = 'none';
    renderPage();
  });
}

function renderIncomeList(incomes, category) {
  const addId = category === 'staff' ? 'add-staff-btn' : 'add-player-btn';
  return `
  <div class="income-header">
    <span class="col-label">Activity</span>
    <span class="col-label right">Graded RP</span>
    <span></span>
  </div>
  ${incomes.map(inc => `
    <div class="settings-row">
      <div><span class="m-label">Activity</span><input type="text" class="settings-input income-name" data-id="${inc.id}" value="${inc.name}" style="text-align:left"></div>
      <div><span class="m-label">Graded RP</span><input type="number" class="settings-input income-grp" data-id="${inc.id}" value="${inc.grp}" min="1" step="1"></div>
      <button class="del-btn del-income" data-id="${inc.id}">Remove</button>
    </div>`).join('')}
  <div class="add-row">
    <input type="text" class="settings-input" id="${addId}-name" placeholder="New activity name" style="text-align:left">
    <input type="number" class="settings-input" id="${addId}-grp" placeholder="GRP" min="1">
    <button class="btn btn-ghost" id="${addId}" style="padding:0.4rem 0.75rem;font-size:0.65rem">+ Add</button>
  </div>`;
}

function addIncome(category) {
  const prefix = category === 'staff' ? 'add-staff-btn' : 'add-player-btn';
  const name   = document.getElementById(prefix+'-name').value.trim();
  const grp    = parseInt(document.getElementById(prefix+'-grp').value)||0;
  if (!name || grp < 1) { alert('Enter a name and Graded RP value.'); return; }
  _incomes.push({ id: 'inc_'+Date.now(), name, grp, category });
  markDirty();
  document.getElementById('player-incomes-wrap').innerHTML = renderIncomeList(_incomes.filter(i=>i.category!=='staff'),'player');
  document.getElementById('staff-incomes-wrap').innerHTML  = renderIncomeList(_incomes.filter(i=>i.category==='staff'), 'staff');
}

async function saveAll() {
  // Dial change confirmation — warn if more than 50% away from baseline
  const dialDeviation = Math.abs(_config.master_dial - 0.005) / 0.005;
  if (dialDeviation > 0.5) {
    const confirmed = confirm(
      'This is a significant dial change. Only recommended during planned season resets. Continue?'
    );
    if (!confirmed) return;
  }

  const btn = document.getElementById('save-all-btn');
  btn.textContent = 'Saving...'; btn.disabled = true;
  try {
    await Promise.all([
      adminSave('config',  _config),
      adminSave('incomes', _incomes),
    ]);
    _data  = await forceRefresh();
    _dirty = false;
    document.getElementById('save-bar').style.display = 'none';
    document.getElementById('save-status').textContent = '✅ Saved';
    renderPage();
  } catch(err) {
    alert('Save failed: '+err.message);
    btn.textContent = 'Save All Changes'; btn.disabled = false;
  }
}
</script>
</body>
</html>
