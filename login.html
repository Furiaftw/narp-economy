<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NARP Economy — Sign In</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
<div id="nav-mount"></div>
<div style="display:flex;align-items:center;justify-content:center;min-height:80vh;padding:2rem">
  <div style="text-align:center;max-width:360px">
    <div class="hero-kamon" style="margin-bottom:2rem">🔒</div>
    <div class="hero-eyebrow" style="margin-bottom:0.75rem">Admin Access Required</div>
    <h2 style="font-family:var(--ff-display);font-size:1.6rem;margin-bottom:1rem">Sign In</h2>
    <p style="color:var(--ash-light);font-style:italic;margin-bottom:2rem">
      This section is restricted to authorized NARP staff.
    </p>
    <button class="btn btn-gold" id="login-btn" style="width:100%;justify-content:center;padding:0.75rem">
      Sign In with Google
    </button>
    <p style="margin-top:1.5rem;font-size:0.8rem;color:var(--ash)">
      Not on the staff list? <a href="/" style="color:var(--seal-gold)">Return to public site →</a>
    </p>
  </div>
</div>
<script>
  netlifyIdentity.on('init', user => {
    if (user) {
      const redirect = new URLSearchParams(window.location.search).get('redirect') || '/admin/dashboard.html';
      window.location.href = redirect;
    }
  });
  netlifyIdentity.on('login', () => {
    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/admin/dashboard.html';
    netlifyIdentity.close();
    window.location.href = redirect;
  });
  document.getElementById('login-btn').addEventListener('click', () => netlifyIdentity.open('login'));
  netlifyIdentity.init();
</script>
</body>
</html>
